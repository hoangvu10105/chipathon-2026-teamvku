meta:
  version: 3
  flow: Chip
  substituting_steps:
    # The workshop padring uses physical pad cells, so top-level PAD
    # ports are intentionally not placed as standalone IO pins.
    OpenROAD.GlobalPlacement: OpenROAD.GlobalPlacementSkipIO

    # Disable KLayout DRC
    #KLayout.DRC: null
    #Checker.KLayoutDRC: null

    # Disable KLayout antenna check
    #KLayout.Antenna: null
    #Checker.KLayoutAntenna: null

    # Disable KLayout density check
    #KLayout.Density: null
    #Checker.KLayoutDensity: null

    # Save time during development
    # Enable for sign-off
    #OpenROAD.IRDropReport: null
    #Magic.DRC: null
    #Checker.MagicDRC: null
    #KLayout.XOR: null
    #Netgen.LVS: null
    #Checker.LVS: null

DESIGN_NAME: chip_top
VERILOG_FILES:
- dir::../src/chip_top.sv
- dir::../src/chip_core.sv
- dir::../src/sfe_channel.sv
- dir::../src/sfe_encoder_bank.sv
- dir::../src/sfe_event_packetizer.sv
- dir::../src/sfe_audio_frontend_top.sv
- dir::../src/sfe_fanout_buffer.sv
- dir::../src/gf180_io_stubs.v

# Enable plugin for better SystemVerilog support
# USE_SLANG: True
# SLANG_ARGUMENTS: ['--keep-hierarchy']

# Slightly smaller file sizes
PRIMARY_GDSII_STREAMOUT_TOOL: klayout

# GF180 IO pad physical views used by the workshop slot.
PAD_CFG: dir::../src/sfe_pad_cfg.tcl
PAD_SITE_NAME: GF_IO_Site
PAD_CORNER_SITE_NAME: GF_COR_Site
PAD_CORNER:
- gf180mcu_fd_io__cor
PAD_FILLERS:
- gf180mcu_fd_io__fill10
- gf180mcu_fd_io__fill5
- gf180mcu_fd_io__fill1
PAD_PLACE_IO_TERMINALS:
- gf180mcu_fd_io__dvdd/DVDD
- gf180mcu_fd_io__dvss/DVSS
- gf180mcu_fd_io__asig_5p0/ASIG5V
- gf180mcu_fd_io__bi_24t/PAD
- gf180mcu_fd_io__in_c/PAD
- gf180mcu_fd_io__in_s/PAD
EXTRA_LEFS:
- dir::../src/gf180_io_site.lef
- /foss/pdks/gf180mcuD/libs.ref/gf180mcu_fd_io/lef/gf180mcu_fd_io__asig_5p0.lef
- /foss/pdks/gf180mcuD/libs.ref/gf180mcu_fd_io/lef/gf180mcu_fd_io__bi_24t.lef
- /foss/pdks/gf180mcuD/libs.ref/gf180mcu_fd_io/lef/gf180mcu_fd_io__cor.lef
- /foss/pdks/gf180mcuD/libs.ref/gf180mcu_fd_io/lef/gf180mcu_fd_io__dvdd.lef
- /foss/pdks/gf180mcuD/libs.ref/gf180mcu_fd_io/lef/gf180mcu_fd_io__dvss.lef
- /foss/pdks/gf180mcuD/libs.ref/gf180mcu_fd_io/lef/gf180mcu_fd_io__fill1.lef
- /foss/pdks/gf180mcuD/libs.ref/gf180mcu_fd_io/lef/gf180mcu_fd_io__fill5.lef
- /foss/pdks/gf180mcuD/libs.ref/gf180mcu_fd_io/lef/gf180mcu_fd_io__fill10.lef
- /foss/pdks/gf180mcuD/libs.ref/gf180mcu_fd_io/lef/gf180mcu_fd_io__in_c.lef
- /foss/pdks/gf180mcuD/libs.ref/gf180mcu_fd_io/lef/gf180mcu_fd_io__in_s.lef
EXTRA_GDS:
- /foss/pdks/gf180mcuD/libs.ref/gf180mcu_fd_io/gds/gf180mcu_fd_io.gds

# SDC files
PNR_SDC_FILE: dir::chip_top.sdc
SIGNOFF_SDC_FILE: dir::chip_top.sdc
FALLBACK_SDC: dir::chip_top.sdc

# Power / ground nets
VDD_NETS:
- VDD
GND_NETS:
- VSS

# We need to add gf180mcu_fd_io__bi_24t
# due to the unused Y output for output only pads
IGNORE_DISCONNECTED_MODULES:
- gf180mcu_fd_io__bi_24t
# - gf180mcu_ws_ip__id    # disabled with chip_top.sv instantiation
# - gf180mcu_ws_ip__logo

# Clock
CLOCK_PORT: clk_PAD
CLOCK_NET: clk_pad/Y
CLOCK_PERIOD: 40 # 25 MHz
SYNTH_MAX_FANOUT: 10
SYNTH_MAX_TRAN: 3.0
MAX_TRANSITION_CONSTRAINT: 3.0
MAX_FANOUT_CONSTRAINT: 10

# Fix hold violations
PL_RESIZER_HOLD_SLACK_MARGIN: 0.35
GRT_RESIZER_HOLD_SLACK_MARGIN: 0.25

# Increase for more logic
# on your die
PL_TARGET_DENSITY_PCT: 35
GRT_ALLOW_CONGESTION: true

# Keep detailed-router antenna repair disabled to avoid the DRT-0073 crash seen
# in earlier runs. Antenna diode insertion is handled before detailed routing by
# OpenROAD.RepairAntennas/Odb.DiodesOnPorts.
DRT_ANTENNA_REPAIR_ITERS: 0
DRT_ANTENNA_REPAIR_MARGIN: 10 # %

# PDN - Straps
PDN_VWIDTH: 5
PDN_HWIDTH: 5
PDN_VSPACING: 1
PDN_HSPACING: 1
PDN_VPITCH: 75
PDN_HPITCH: 75

# PDN - Core ring
PDN_CORE_RING: True
# Maximum metal width without slotting: 30um
PDN_CORE_RING_VWIDTH: 25
PDN_CORE_RING_HWIDTH: 25
PDN_CORE_RING_CONNECT_TO_PADS: True
PDN_ENABLE_PINS: False
PDN_CORE_VERTICAL_LAYER: Metal2
PDN_CORE_HORIZONTAL_LAYER: Metal3

# Due to OpenROAD bug
# https://github.com/The-OpenROAD-Project/OpenROAD/issues/8229
#PL_TIME_DRIVEN: False
#PL_ROUTABILITY_DRIVEN: False

# Do not error on magic DRC violations
# Note: Passing magic DRC is not required for the submission.
# However, it is recommended to fix or carefully review all violations.
ERROR_ON_MAGIC_DRC: False

# The SFE RTL currently triggers Yosys check false positives from
# function-local wires and mem2reg FIFO temporaries after successful
# technology mapping. Keep the full reports for review, but allow the
# GF180 physical flow to proceed to placement/routing/signoff.
ERROR_ON_SYNTH_CHECKS: False

# Prevent false positive DRC errors in I/O cells
MAGIC_GDS_FLATGLOB:
# For contacts
- "*_CDNS_*"
# Foundry provided SRAMs
- "*$$*"
- "M1_N*"
- "M1_P*"
- "M2_M1*"
- "M3_M2*"
- "nmos_5p0*"
- "nmos_1p2*"
- "pmos_5p0*"
- "pmos_1p2*"
- "via1_*"
- "ypass_gate*"
- "G_ring_*"
# These additional cells must be flattened to get rid of 3.3V devices
# (DUALGATE drawn into high-level cells)
- "dcap_103*"
- "din_*"
- "mux821_*"
- "rdummy_*"
- "pmoscap_*"
- "xdec_*"
- "ypredec*"
- "xpredec*"
- "prexdec_*"
- "xdec8_*"
- "xdec16_*"
- "xdec32_*"
- "sa_*"

# Since we cannot meet the minimum density limit on Metal2,
# ignore active metal on previous and subsequent layers
# (DM.5_DM.7 and DM.4_DM.6). Dummy metal is moved to active
# metal during the precheck.
KLAYOUT_FILLER_OPTIONS:
  Metal2_ignore_active: true

# Because we have multiple power pads for one power domain
MAGIC_EXT_UNIQUE: notopports

# chip_id + wafer.space logo enabled for chipathon tapeout (chip_id required).
MACROS:
  gf180mcu_ws_ip__id:
    gds:
      - dir::../ip/gf180mcu_ws_ip__id/gds/gf180mcu_ws_ip__id.gds
    lef:
      - dir::../ip/gf180mcu_ws_ip__id/lef/gf180mcu_ws_ip__id.lef
    vh:
      - dir::../ip/gf180mcu_ws_ip__id/vh/gf180mcu_ws_ip__id.v
    lib:
      "*":
        - dir::../ip/gf180mcu_ws_ip__id/lib/gf180mcu_ws_ip__id.lib
    instances:
      chip_id:
        location: [26, 26]
        orientation: N

  gf180mcu_ws_ip__logo:
    gds:
      - dir::../ip/gf180mcu_ws_ip__logo/gds/gf180mcu_ws_ip__logo.gds
    lef:
      - dir::../ip/gf180mcu_ws_ip__logo/lef/gf180mcu_ws_ip__logo.lef
    vh:
      - dir::../ip/gf180mcu_ws_ip__logo/vh/gf180mcu_ws_ip__logo.v
    lib:
      "*":
        - dir::../ip/gf180mcu_ws_ip__logo/lib/gf180mcu_ws_ip__logo.lib
    instances:
      wafer_space_logo:
        location: ["expr::$DIE_AREA[2] + -169.25", "expr::$DIE_AREA[3] + -169.25"]
        orientation: N

# No user macros for the workshop slot -- the core is a trivial
# counter.  chip_id + wafer.space logo (above) are the only placed
# macros.

# No macro PDN connections needed beyond what the PDN grid already
# supplies through chip_id / logo.  Keep the key as an empty list so
# the rest of the config still parses.
PDN_MACRO_CONNECTIONS: []

# Halo size around macros while cutting rows.
# Workaround for: https://github.com/The-OpenROAD-Project/OpenROAD/issues/8868
FP_MACRO_HORIZONTAL_HALO: 10
FP_MACRO_VERTICAL_HALO: 10
PDN_HORIZONTAL_HALO: 5
PDN_VERTICAL_HALO: 5

PDN_CFG: dir::pdn_cfg.tcl
# Experimental post-global-route repair pass to reduce max slew/cap/fanout warnings.
RUN_POST_GRT_DESIGN_REPAIR: true
RUN_POST_GRT_RESIZER_TIMING: true
GRT_RESIZER_SETUP_SLACK_MARGIN: 0.05
GRT_RESIZER_SETUP_MAX_BUFFER_PCT: 30
GRT_RESIZER_HOLD_MAX_BUFFER_PCT: 30
GRT_RESIZER_ALLOW_SETUP_VIOS: false
GRT_RESIZER_SETUP_BUFFERING: true
GRT_RESIZER_SETUP_BUFFER_REMOVAL: true
GRT_RESIZER_SETUP_GATE_CLONING: true
GRT_RESIZER_RUN_GRT: true
